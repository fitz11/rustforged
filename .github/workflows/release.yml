name: Release

on:
  # CD: automatically build & release on a version tag pushed to main.
  # Linux + Windows build automatically; macOS is manual-only (see below).
  push:
    tags:
      - "v*"
  # Manual runs let you pick which (costly) runners fire.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0)"
        required: true
        type: string
      include_windows:
        description: "Build Windows x64 installer"
        required: false
        type: boolean
        default: true
      include_windows_arm64:
        description: "Build Windows ARM64 installer (manual only)"
        required: false
        type: boolean
        default: false
      include_mac:
        description: "Build macOS DMGs (costly runners)"
        required: false
        type: boolean
        default: false

# Release + manifest push need write access to repo contents.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # CI gate: lint & test on Linux before we cut a release.
  test:
    name: Lint & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libasound2-dev libudev-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

  create-release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: derive version from the tag name (strip leading "v").
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual run: use the provided input.
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine release version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but release version is ${{ steps.version.outputs.version }}"
            echo "Please update Cargo.toml before releasing."
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Rustforged v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libasound2-dev libudev-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release

      - name: Build release binary
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist/rustforged-linux
          cp target/release/rustforged dist/rustforged-linux/
          cp -r assets dist/rustforged-linux/
          cp README.md dist/rustforged-linux/
          cd dist && tar -czvf rustforged-${{ needs.create-release.outputs.version }}-linux-x86_64.tar.gz rustforged-linux

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: dist/rustforged-${{ needs.create-release.outputs.version }}-linux-x86_64.tar.gz

  build-windows-x64:
    name: Build Windows x64
    needs: create-release
    # Auto on tag push; on manual runs only when include_windows is checked.
    if: ${{ github.event_name == 'push' || inputs.include_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release

      - name: Build MSI installer
        run: cargo packager --release --formats wix

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: target/release/packager/*.msi

  build-windows-arm64:
    name: Build Windows ARM64
    needs: create-release
    # Manual-only: never runs automatically on a tag push. Trigger via workflow_dispatch
    # with include_windows_arm64 checked. (Windows x64 is the only auto Windows build.)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_windows_arm64 }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release-arm64

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release --target aarch64-pc-windows-msvc

      # NSIS (.exe), not WiX (.msi): cargo-packager bundles WiX 3.11, whose candle.exe
      # does not support `-arch arm64` (that landed in WiX 3.14), so an arm64 MSI build
      # fails immediately in candle. NSIS supports arm64 and doesn't use candle.
      - name: Build NSIS installer
        run: cargo packager --release --target aarch64-pc-windows-msvc --binaries-dir target/aarch64-pc-windows-msvc/release --formats nsis

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: target/release/packager/*-setup.exe

  build-macos-arm64:
    name: Build macOS ARM64
    needs: create-release
    # macOS runners are costly: manual (workflow_dispatch) runs only, and only
    # when include_mac is checked. Never runs automatically on a tag push.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_mac }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release-macos-arm64

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build DMG
        # The signing identity lives in Cargo.toml ([package.metadata.packager.macos]) —
        # cargo-packager does not read an identity env var. Here it imports the Developer ID
        # cert from APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD into a temporary keychain,
        # signs the .app + DMG, then notarizes + staples via the App Store Connect API key.
        # These jobs are owner-only (workflow_dispatch + include_mac) so the secrets are
        # always present; a missing/invalid cert fails codesign rather than silently
        # producing an unsigned DMG.
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # notarytool needs the .p8 key as a file on disk; materialize it from the
          # base64 secret and point cargo-packager at it via APPLE_API_KEY_PATH.
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            echo "$APPLE_API_KEY_P8" | base64 --decode > "$KEY_PATH"
            export APPLE_API_KEY_PATH="$KEY_PATH"
          fi
          cargo packager --release --target aarch64-apple-darwin --binaries-dir target/aarch64-apple-darwin/release --formats dmg
          # cargo-packager notarizes + staples the .app but not the DMG itself; notarize +
          # staple the DMG so a downloaded disk image opens without a Gatekeeper warning.
          if [ -n "$APPLE_API_KEY_P8" ]; then
            for dmg in target/release/packager/*_aarch64.dmg; do
              xcrun notarytool submit "$dmg" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
              xcrun stapler staple "$dmg"
            done
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: target/release/packager/*_aarch64.dmg

  build-macos-x64:
    name: Build macOS Intel (x86_64)
    needs: create-release
    # macOS runners are costly: manual (workflow_dispatch) runs only, and only
    # when include_mac is checked. Never runs automatically on a tag push.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_mac }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release-macos-x64

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build release binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build DMG
        # See build-macos-arm64 for how signing/notarization is wired; identical here.
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            echo "$APPLE_API_KEY_P8" | base64 --decode > "$KEY_PATH"
            export APPLE_API_KEY_PATH="$KEY_PATH"
          fi
          cargo packager --release --target x86_64-apple-darwin --binaries-dir target/x86_64-apple-darwin/release --formats dmg
          # cargo-packager notarizes + staples the .app but not the DMG itself; notarize +
          # staple the DMG so a downloaded disk image opens without a Gatekeeper warning.
          if [ -n "$APPLE_API_KEY_P8" ]; then
            for dmg in target/release/packager/*_x64.dmg; do
              xcrun notarytool submit "$dmg" --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
              xcrun stapler staple "$dmg"
            done
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: target/release/packager/*_x64.dmg

  publish-manifest:
    name: Publish Release Manifest
    needs:
      [
        create-release,
        build-linux,
        build-windows-x64,
        build-windows-arm64,
        build-macos-arm64,
        build-macos-x64,
      ]
    runs-on: ubuntu-latest
    # Run as long as nothing was cancelled and the always-on jobs succeeded.
    # Optional platform jobs may be skipped (macOS on tags, either on manual
    # runs) — a skip must not block the manifest, but a real failure should.
    if: >-
      ${{ !cancelled()
      && needs.create-release.result == 'success'
      && needs.build-linux.result == 'success'
      && needs.build-windows-x64.result != 'failure'
      && needs.build-windows-arm64.result != 'failure'
      && needs.build-macos-arm64.result != 'failure'
      && needs.build-macos-x64.result != 'failure' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Generate release manifest from GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          mkdir -p releases

          # Get asset URLs from the GitHub release
          RELEASE_DATA=$(gh api repos/${{ github.repository }}/releases/tags/v${VERSION})

          # Extract asset URLs for each platform
          WIN_X64_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("x64.*\\.msi$")) | .browser_download_url' | head -1)
          WIN_ARM64_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("(arm64|aarch64).*setup\\.exe$")) | .browser_download_url' | head -1)
          MACOS_ARM64_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("aarch64\\.dmg$")) | .browser_download_url' | head -1)
          MACOS_X64_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("_x64\\.dmg$")) | .browser_download_url' | head -1)

          # Generate manifest JSON
          cat > releases/latest.json << EOF
          {
            "version": "${VERSION}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
            "release_notes": "See the release page for full release notes.",
            "assets": {
              "windows-x64": "${WIN_X64_URL:-}",
              "windows-arm64": "${WIN_ARM64_URL:-}",
              "macos-aarch64": "${MACOS_ARM64_URL:-}",
              "macos-x86_64": "${MACOS_X64_URL:-}"
            }
          }
          EOF

          # Remove empty asset entries
          jq 'del(.assets[] | select(. == ""))' releases/latest.json > releases/latest.tmp && mv releases/latest.tmp releases/latest.json

          echo "Generated manifest:"
          cat releases/latest.json

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: the /releases dir is gitignored (local build artifacts), but the manifest
          # itself must be tracked so the in-app update checker can read it from the repo.
          git add -f releases/latest.json
          git diff --staged --quiet || git commit -m "Update release manifest for v${{ needs.create-release.outputs.version }}"
          git push
